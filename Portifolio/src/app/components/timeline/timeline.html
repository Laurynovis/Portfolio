<div class="timeline-wrapper">
  <h2 class="timeline-title">Minha Trajetória</h2>

  <div class="timeline-container">
    @for (item of trajetoria(); track item.titulo) {
      
      <app-scroll-reveal class="timeline-card">
        
        <div class="timeline-marker" [class.work]="item.tipo === 'trabalho'">
           @if (item.tipo === 'trabalho') {
             <span class="icon">💼</span>
           } @else {
             <span class="icon">🎓</span>
           }
        </div>

        <div class="timeline-content">
          <span class="periodo">{{ item.periodo }}</span>
          <h3 class="cargo">{{ item.titulo }}</h3>
          <h4 class="instituicao">{{ item.empresa }}</h4>
          <p class="descricao">{{ item.descricao }}</p>
        </div>

      </app-scroll-reveal>

    } @empty {
      <p class="empty-msg">Nenhuma experiência registrada ainda.</p>
    }
  </div>
</div>
