<div class="carousel-wrapper">
  <div class="card-stack">
    @for (projeto of projetos(); track projeto.id; let i = $index) {
      <div class="project-card" 
           [class.active]="i === currentIndex()"
           [class.hidden]="i !== currentIndex()">
        
        <div class="card-content">
          <span class="tech-tag">{{ projeto.tech }}</span>
          <h2>{{ projeto.title }}</h2>
          <p>{{ projeto.shortDesc }}</p>
          
          <button class="view-btn" (click)="verProjeto(projeto.id)">
            Ver detalhes
          </button>
        </div>

        <div class="nav-container">
          <button class="nav-btn" (click)="prev()">&#10094;</button>
          <div class="nav-divider"></div>
          <button class="nav-btn" (click)="next()">&#10095;</button>
        </div>

        <div class="card-index">{{ i + 1 }} / {{ projetos().length }}</div>
      </div>
    }
  </div>
</div>
